set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm*:RGB"
set -as terminal-features ",xterm-kitty:RGB"

set -g default-shell /bin/zsh
set -g mouse on
set -g focus-events on
set -g allow-passthrough on
set -g history-limit 50000

set-window-option -g automatic-rename on
# Use the foreground command name as the window label (`zsh`, `nvim`,
# `claude`, etc.). The default `automatic-rename-format` falls back
# to hostname in some edge cases — that's why idle windows used to
# show `romanvolkovs-MacBook-Pro.local`. `pane_current_command` always
# resolves to a real process name.
set-window-option -g automatic-rename-format '#{pane_current_command}'
set-option -g set-titles on

# Use | and - to split a window vertically and horizontally instead of " and % respoectively
unbind '"'
unbind %
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

unbind C-b
set-option -g prefix C-s
bind-key C-s send-prefix

# Reload tmux config without killing the session.
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Use shift + arrow key to move between windows in a session
bind -n S-Left  previous-window
bind -n S-Right next-window

# Status bar — colors mirror nvim's lualine catppuccin-macchiato theme.
# Lualine's layout (with transparent_background = true):
#   a (mode)   bg=blue     fg=mantle  bold   — solid colored pill
#   b (branch) bg=surface0 fg=blue            — solid surface pill
#   c (middle) bg=NONE     fg=text            — transparent
#   y (right)  bg=surface0 fg=text            — solid surface pill
#   inactive   bg=NONE     fg=overlay0        — transparent
# Palette: blue #8aadf4, surface0 #363a4f, mantle #1e2030,
#          text #cad3f5, subtext0 #a5adcb, overlay0 #6e738d.
set -g status-left-length 40
set -g status-interval 60

# Middle of the bar is transparent (kitty translucency shows through),
# matching lualine's `c` section. Active window gets a surface0 pill,
# inactive windows are dim transparent (lualine's inactive `c`).
set -g status-style                 "bg=default,fg=#cad3f5"   # text
set -g window-status-style          "bg=default,fg=#6e738d"   # overlay0 (dim)
set -g window-status-current-style  "bg=#363a4f,fg=#cad3f5,bold"  # surface0 pill
set -g window-status-activity-style "bg=default,fg=#eed49f"   # yellow
set -g message-style                "bg=#363a4f,fg=#cad3f5"
set -g message-command-style        "bg=#363a4f,fg=#cad3f5"

# Automatically renumber window numbers on closing a pane (tmux >= 1.7).
set -g renumber-windows on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

set -sg escape-time 10
set -g display-panes-time 3000


### 
# Ctrl + S + W -> preview list of opened tabs
# Ctrl + S + $ - rename tab
# https://tmuxcheatsheet.com

# pane colors — catppuccin macchiato palette (matches kitty/bat/nvim)
set -g pane-border-style fg="#6e738d"          # surface2
set -g pane-active-border-style fg="#8aadf4"   # blue



# integration of https://github.com/christoomey/vim-tmux-navigator
# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# bind-key -n C-Space copy-mode
set-window-option -g mode-keys vi
set -g set-clipboard on
# copy selection into system clipboard and exit copy-mode
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel



# open daily note
bind-key d run-shell "~/bin/daily.sh"

# <prefix> H  — dump the entire pane scrollback into a temp file and
# open it in nvim. `-S -` means "from the very start of history" — no
# magic line number to outgrow the configured history-limit.
bind-key H run-shell 'tmux capture-pane -p -S - > /tmp/tmux-history-#{pane_id}.txt && tmux new-window "nvim + /tmp/tmux-history-#{pane_id}.txt && rm /tmp/tmux-history-#{pane_id}.txt"'

# <prefix> /  — fuzzy-search the current pane's scrollback with fzf in
# a popup, then paste the picked line back at the prompt. Replaces the
# old kitty-side `cmd+f` overlay, which couldn't see tmux's alt-screen.
# `display-popup -E` gives fzf an interactive tty (run-shell does not).
# `send-keys -l` sends literal text — safe for scrollback that may
# contain shell metacharacters or tmux keyname syntax.
bind-key / display-popup -E -w 90% -h 75% \
  "line=$(tmux capture-pane -p -S - -t '#{pane_id}' \
            | fzf --no-sort --tac --exact -i --prompt='scrollback> '); \
   [ -n \"\$line\" ] && tmux send-keys -t '#{pane_id}' -l -- \"\$line\""


# ===== Plugins (TPM) =====
# After first install: run install.sh, then in tmux press prefix + I
# to fetch the listed plugins. <prefix> is C-s for this config.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'    # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'    # auto save + restore on launch
set -g @plugin 'tmux-plugins/tmux-yank'         # better clipboard integration
set -g @plugin 'MunifTanjim/tmux-mode-indicator' # show prefix/copy mode
set -g @plugin 'catppuccin/tmux'                # theme (matches nvim macchiato)

# tmux-resurrect: also restore neovim/vim sessions when present
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
# tmux-continuum: save every 15 minutes, auto-restore on tmux start
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# Catppuccin window pills — colors match lualine's `a` (mode) and `b`
# (branch) pill styling so the tmux bar feels like an extension of
# nvim's statusline. `_text_color` is the bg of the text part,
# `_number_color` is the bg of the number part (yes, the "_color"
# suffix is a misnomer in catppuccin-tmux's API).
#   inactive window: number=surface0 bg / blue fg, text=transparent / overlay0 fg
#   active window:   number=blue bg / mantle fg,   text=surface0 bg / text fg
# (mirrors lualine: inactive ≈ b inverted, active ≈ a + b)
set -g @catppuccin_flavour 'macchiato'
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_status_background  "default"

set -g @catppuccin_window_number_color       "#363a4f"   # surface0 bg
set -g @catppuccin_window_text_color         "default"   # transparent bg
set -g @catppuccin_window_current_number_color "#8aadf4" # blue bg (= lualine `a`)
set -g @catppuccin_window_current_text_color   "#363a4f" # surface0 bg (= lualine `b`)

# Use `#W` (window NAME — our automatic-rename-format) not `#T`
# (window TITLE — falls back to hostname).
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"

# Right side — make sure if catppuccin's session/app modules ever come
# back, they default to transparent.
set -g @catppuccin_session_background     "default"
set -g @catppuccin_session_color          "#a5adcb"
set -g @catppuccin_application_background "default"
set -g @catppuccin_application_color      "#a5adcb"

# Mode indicator left — mirror lualine's mode pill (solid blue with
# mantle fg + bold). Other modes use lualine's mode-color analogues:
#   prefix held → command mode in lualine = peach
#   copy mode   → search/yank        analog = yellow
#   sync mode   → replace            analog = red
set -g @mode_indicator_empty_prompt ' TMUX '
set -g @mode_indicator_prefix_prompt ' WAIT '
set -g @mode_indicator_copy_prompt  ' COPY '
set -g @mode_indicator_sync_prompt  ' SYNC '
set -g @mode_indicator_empty_mode_style  'bg=#8aadf4,fg=#1e2030,bold'
set -g @mode_indicator_prefix_mode_style 'bg=#f5a97f,fg=#1e2030,bold'
set -g @mode_indicator_copy_mode_style   'bg=#eed49f,fg=#1e2030,bold'
set -g @mode_indicator_sync_mode_style   'bg=#ed8796,fg=#1e2030,bold'

# Statusline composition.
#   left:  tmux-mode-indicator (TMUX / WAIT / COPY / SYNC) — minimal
#          and dim, only the non-empty modes draw the eye.
#   right: just the clock. Catppuccin's application module showed the
#          tmux version (`2.1.132`) and the session module showed the
#          default session id (`0`); neither was useful, so they're
#          dropped. A renamed session can still be shown via `#S`.
set -g status-left  '#{tmux_mode_indicator}'
# Right-side clock styled as a surface0 pill — matches lualine's `y`
# section (progress + location) so the two ends of the tmux bar mirror
# the two ends of nvim's lualine.
set -g status-right '#[bg=#363a4f,fg=#cad3f5] %H:%M '

# Init TPM — this MUST be the very last line of the file.
run '~/.tmux/plugins/tpm/tpm'
