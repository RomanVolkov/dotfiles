# The following command checks if tmux is installed.
# If tmux is installed, it automatically attaches to an existing tmux session.
# If no tmux session exists, a new one is created.
# If tmux is not installed, it simply starts zsh without tmux.
shell zsh --login -c "if command -v tmux >/dev/null 2>&1; then tmux attach -t main || (tmux new-session -d -s main -n 'main'; tmux attach -t main); else /bin/zsh; fi"
# Let kitty advertise its real terminfo (xterm-kitty) for richer features
# (cursor styling, hyperlinks, true-color). tmux's tmux-256color sets the inner
# layer correctly. If you SSH somewhere without xterm-kitty terminfo, use:
#   kitty +kitten ssh <host>
editor /opt/homebrew/bin/nvim


# BEGIN_KITTY_THEME
include current-theme.conf
# END_KITTY_THEME

# include kanso_zen.conf

# Default font size — current-font.conf may override (it's included
# after this line, so its `font_size` wins if present).
font_size 18.0

# Font family AND size live in current-font.conf so scripts/kitty-font.sh
# can overwrite both without touching kitty.conf. Switch with `kf`.
include current-font.conf

# Render icon glyphs with Inconsolata Nerd Font — the NON-Mono (proportional)
# variant deliberately, because its glyphs aren't squeezed into one cell, so
# icons render larger than the main IosevkaTerm font would draw them.
# (Do NOT use "...Mono" here — that shrinks the icons back to cell size.)
symbol_map U+E000-U+E00D,U+E0A0-U+E0C8,U+E0CA,U+E0CC-U+E0D4,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E6B1,U+E700-U+E7C5,U+EA60-U+EBEB,U+EE00-U+EE0B,U+F000-U+F2E0,U+F300-U+F32F,U+F400-U+F533,U+F500-U+FD46 Inconsolata Nerd Font

# Allow `kitty @ ...` remote control commands so the font switcher
# can reload config without restarting the terminal.
allow_remote_control yes
listen_on unix:/tmp/mykitty

enable_audio_bell no

window_margin_width     10
background_tint         0.97
background_tint_gaps    -10.0
window_padding_width 5

window_border_width     0pt
active_border_color     #44ffff
single_window_margin_width 0
macos_option_as_alt yes
draw_minimal_borders yes

hide_window_decorations titlebar-only
confirm_os_window_close 0

# Don't show the window/tab title up in the macOS menu bar.
macos_show_window_title_in none

cursor_shape block
cursor_blink_interval 0.5
cursor_trail 10
cursor_trail_start_threshold 0
cursor_trail_decay 0.01 0.15
# shell_integration no-cursor

background_opacity 0.85
background_blur 20



# keymaps
# (Scrollback search via fzf is bound at the tmux layer instead — see
# .tmux.conf `bind /`. kitty's @screen_scrollback can't see what tmux
# is rendering on its alt-screen, so the kitty-side binding was a no-op
# inside tmux sessions.)

# Disable kitty's own tab/window (split) creation & closing — tmux is the
# window manager. Defaults verified against kitty 0.46.2; both the
# kitty_mod (ctrl+shift) and macOS cmd variants are cleared.
# new_tab
map kitty_mod+t     no_op
map cmd+t           no_op
# new_window (split within a tab)
map kitty_mod+enter no_op
map cmd+enter       no_op
# new_os_window
map kitty_mod+n     no_op
map cmd+n           no_op
# close_tab
map kitty_mod+q     no_op
map cmd+w           no_op
# close_window
map kitty_mod+w     no_op
map shift+cmd+d     no_op
# close_os_window
map shift+cmd+w     no_op
